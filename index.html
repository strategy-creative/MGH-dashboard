<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MGH Marketing Dashboard</title>
  <link rel="stylesheet" href="https://use.typekit.net/ock4zgp.css" />
  <style>

    /* ============================================================
       MGH BRAND TOKENS
       ============================================================ */
    :root {
      --ebony:        #1F1F1E;
      --white:        #FFFFFF;
      --mist:         #ECE8DF;
      --taupe:        #B6AEA5;
      --claret:       #452127;
      --vermilion:    #AC3939;
      --racing-green: #36453D;
      --mid-green:    #838C73;
      --font:         'neue-haas-grotesk-text', sans-serif;
      --up:           #2E7D4F;
      --down:         var(--vermilion);
      --line-light:   rgba(0,0,0,0.1);
      --line-dark:    rgba(255,255,255,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font); background: var(--white); }

    /* ============================================================
       PASSWORD GATE
       ============================================================ */
    #gate {
      position: fixed; inset: 0;
      background: var(--ebony);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 48px;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #gate.unlocked { opacity: 0; visibility: hidden; pointer-events: none; }
    .gate-divider { width: 40px; height: 1px; background: rgba(255,255,255,0.1); }
    .gate-label { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--taupe); }
    .gate-form { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 320px; }
    .gate-input {
      width: 100%; background: transparent;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 2px;
      color: var(--white); font-family: var(--font); font-size: 15px;
      letter-spacing: 0.08em; padding: 14px 20px; text-align: center; outline: none;
      transition: border-color 0.2s;
    }
    .gate-input::placeholder { color: rgba(255,255,255,0.25); }
    .gate-input:focus { border-color: rgba(255,255,255,0.45); }
    .gate-input.error { border-color: var(--vermilion); animation: shake 0.3s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    .gate-btn {
      width: 100%; background: var(--white); border: none; border-radius: 2px;
      color: var(--ebony); cursor: pointer; font-family: var(--font);
      font-size: 13px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 14px 20px; transition: background 0.2s;
    }
    .gate-btn:hover { background: var(--mist); }
    .gate-error { font-size: 12px; color: var(--vermilion); min-height: 16px; text-align: center; }

    /* ============================================================
       DASHBOARD WRAPPER
       ============================================================ */
    #dashboard { display: none; min-width: 1920px; }
    #dashboard.visible { display: block; }

    /* ============================================================
       HEADER
       ============================================================ */
    .dash-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 40px 49px 32px 49px; background: var(--white);
    }
    .dash-title { font-size: 38px; font-weight: 400; color: var(--ebony); letter-spacing: -0.01em; line-height: 1.1; }
    .dash-period { font-size: 14px; color: var(--ebony); font-weight: 400; margin-top: 16px; }

    /* ============================================================
       MAIN CONTENT WRAPPER
       ============================================================ */
    .dash-content { padding: 0 49px 60px 49px; display: flex; flex-direction: column; gap: 28px; }

    /* ============================================================
       HORIZONTAL DIVIDER LINE
       ============================================================ */
    .hl       { height: 1px; background: var(--line-light); width: 100%; }
    .hl--dark { background: var(--line-dark); }

    /* ============================================================
       SECTION 1 — KPI CARDS
       ============================================================ */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 29px;
    }
    .kpi-card {
      background: #F1F1F1;
      border-radius: 15px;
      padding: 40px 32px 29px 32px;
      min-height: 762px;
      display: flex; flex-direction: column;
    }
    .kpi-card-title {
      font-size: 13px; font-weight: 400;
      color: var(--ebony); margin-bottom: 28px;
    }
    .kpi-rows { flex: 1; display: flex; flex-direction: column; }
    .kpi-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 16px 0;
      border-top: 1px solid var(--line-light);
    }
    .kpi-period { font-size: 13px; color: var(--ebony); font-weight: 400; line-height: 1.4; }
    .kpi-value-group { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .kpi-value { font-size: 80px; font-weight: 400; color: var(--ebony); letter-spacing: -0.02em; line-height: 1; }
    .kpi-value.na { color: var(--taupe); }
    .key-insights {
      min-height: 90px;
      padding-top: 24px;
      font-size: 11px; color: var(--ebony); line-height: 1.6;
    }
    .key-insights-label { font-weight: 500; display: block; margin-bottom: 4px; }

    /* Trend indicators */
    .trend { display: inline-flex; align-items: center; gap: 4px; font-size: 18px; font-weight: 500; }
    .trend.up      { color: var(--up); }
    .trend.down    { color: var(--down); }
    .trend.neutral { color: var(--taupe); }

    /* ============================================================
       SECTION 2 — SHOWHOME VISITS
       ============================================================ */
    .section--showhome { background: var(--mist); border-radius: 15px; padding: 30px; }
    .showhome-title { font-size: 35px; font-weight: 400; color: var(--ebony); margin-bottom: 90px; }
    .showhome-grid {
      display: grid;
      grid-template-columns: repeat(4, 370px);
      justify-content: space-between;
      row-gap: 10px;
    }
    .showhome-cell {
      width: 370px;
      min-height: 120px;
      padding-top: 15px;
      border-top: 1px solid var(--line-light);
      display: flex; flex-direction: row; align-items: flex-start; justify-content: space-between; gap: 8px;
    }
    .showhome-cell--empty { border-top: none; }
    .showhome-location { font-size: 13px; color: var(--ebony); line-height: 1.4; flex: 1; }
    .showhome-count { font-size: 70px; font-weight: 400; color: var(--ebony); letter-spacing: -0.03em; line-height: 1; flex-shrink: 0; }
    .showhome-footer { margin-top: 80px; font-size: 11px; color: var(--ebony); }

    /* ============================================================
       SECTION 3 — BUDGET TRACKING
       ============================================================ */
    .section--budget { background: var(--racing-green); border-radius: 15px; padding: 49px 30px 80px 30px; }
    .budget-eyebrow { font-size: 13px; font-weight: 400; color: var(--white); margin-bottom: 2px; }
    .budget-section-title { font-size: 35px; font-weight: 400; color: var(--white); margin-bottom: 40px; }
    .budget-eyebrow--ytd { font-size: 13px; font-weight: 400; color: var(--white); margin-bottom: 2px; }
    .budget-section-title--ytd { font-size: 35px; font-weight: 400; color: var(--white); margin-bottom: 40px; }
    .budget-row {
      display: grid; gap: 0;
      padding: 0;
    }
    .budget-row--actual  { grid-template-columns: repeat(3, 700px); justify-content: space-between; }
    .budget-row--planned { grid-template-columns: repeat(3, 700px); justify-content: space-between; margin-top: 40px; }
    .budget-cell {
      display: flex; flex-direction: row; align-items: flex-start; justify-content: space-between;
      gap: 16px; padding: 20px 24px 20px 0;
      border-top: 1px solid var(--line-dark);
    }
    .budget-cell-text { flex: 1; }
    .budget-label    { font-size: 12px; font-weight: 400; color: var(--white); margin-bottom: 2px; }
    .budget-sublabel { font-size: 11px; color: rgba(255,255,255,0.65); margin-bottom: 0; }
    .budget-value    { font-size: 56px; font-weight: 400; color: var(--white); letter-spacing: -0.03em; line-height: 1; flex-shrink: 0; }
    .budget-value.dim { color: rgba(255,255,255,0.3); }

    /* YTD sub-block */
    .budget-ytd-spacer { height: 111px; }
    .budget-ytd-grid { display: grid; grid-template-columns: repeat(4, 1fr); column-gap: 50px; row-gap: 0; }
    .budget-ytd-grid + .budget-ytd-grid { margin-top: 40px; }
    .budget-ytd-cell {
      display: flex; flex-direction: row; align-items: flex-start; justify-content: space-between;
      gap: 12px; padding: 20px 24px 20px 0; border-top: 1px solid var(--line-dark);
    }
    .budget-ytd-label { font-size: 11px; color: var(--white); line-height: 1.3; flex: 1; }
    .budget-ytd-value { font-size: 40px; font-weight: 400; color: var(--white); letter-spacing: -0.02em; flex-shrink: 0; }
    .budget-ytd-value.dim { color: rgba(255,255,255,0.3); font-size: 32px; }
    .budget-ytd-grid--prev .budget-ytd-cell { border-top-color: rgba(131,140,115,0.4); }
    .budget-ytd-grid--prev .budget-ytd-label { color: var(--mid-green); }
    .budget-ytd-grid--prev .budget-ytd-value,
    .budget-ytd-grid--prev .budget-ytd-value.dim { color: var(--mid-green); font-size: 40px; }

    /* ============================================================
       SECTION 4 — LEAD CYCLE
       ============================================================ */
    .section--lead-cycle { background: var(--ebony); border-radius: 15px; padding: 49px 30px 38px 30px; }
    .lead-title { font-size: 20px; font-weight: 400; color: var(--white); margin-bottom: 60px; }
    .lead-grid { display: grid; grid-template-columns: repeat(3, 519px); column-gap: 120px; row-gap: 0; }
    .lead-cell {
      width: 519px;
      padding-top: 20px;
      border-top: 1px solid var(--line-dark);
      display: flex; flex-direction: row; align-items: flex-start; justify-content: space-between; gap: 20px;
    }
    .lead-cell-left  { flex: 1; }
    .lead-cell-right { display: flex; flex-direction: column; align-items: flex-end; gap: 20px; flex-shrink: 0; }
    .lead-period   { font-size: 13px; color: var(--white); font-weight: 400; margin-bottom: 4px; }
    .lead-sublabel { font-size: 11px; color: var(--white); }
    .lead-value    { font-size: 72px; font-weight: 400; color: var(--white); letter-spacing: -0.03em; line-height: 1; }
    .lead-updated {
      margin-top: 90px;
      display: grid;
      grid-template-columns: repeat(3, 519px);
      column-gap: 120px;
    }
    .lead-updated-cell {
      border-top: 1px solid var(--line-dark);
      padding-top: 16px;
      font-size: 12px; color: var(--white);
    }

    /* ============================================================
       SECTION 5 — STICKY STOCK
       ============================================================ */
    .section--sticky { background: var(--mid-green); border-radius: 15px; padding: 49px 27px 19px 27px; }
    .sticky-wrapper { max-width: 1118px; }
    .sticky-eyebrow { font-size: 13px; font-weight: 400; color: var(--white); margin-bottom: 2px; }
    .sticky-title   { font-size: 35px; font-weight: 400; color: var(--white); margin-bottom: 24px; }
    .sticky-grid    { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; }
    .sticky-cell    { padding: 20px 40px 20px 0; border-top: 1px solid var(--line-dark); }
    .sticky-label   { font-size: 12px; color: var(--white); margin-bottom: 10px; }
    .sticky-value   { font-size: 56px; font-weight: 400; color: var(--white); letter-spacing: -0.03em; line-height: 1; margin-bottom: 16px; }
    .sticky-action-label { font-size: 11px; color: var(--white); margin-bottom: 6px; border-top: 1px solid var(--line-dark); padding-top: 14px; }
    .sticky-action  { display: flex; align-items: flex-start; gap: 10px; font-size: 16px; color: var(--white); line-height: 1.35; }
    .sticky-arrow   { flex-shrink: 0; margin-top: 2px; color: var(--white); }
    .sticky-updated { margin-top: 32px; font-size: 12px; color: var(--white); border-top: 1px solid var(--line-dark); padding-top: 16px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    #data-status { display:none; position:fixed; bottom:0; left:0; right:0; z-index:1000; padding:8px 20px; font-family:var(--font); font-size:11px; color:#fff; letter-spacing:0.04em; }
  </style>
</head>

  <div id="data-status"></div>
  <div id="dashboard">

    <!-- HEADER -->
    <header class="dash-header">
      <div>
        <div class="dash-title">MGH Marketing Dashboard</div>
        <div class="dash-period" id="dash-period">(Month)</div>

      const isGood = isPositiveGood ? isUp : !isUp;
      const cls    = isGood ? 'up' : 'down';
      const arrow  = isUp ? '▲' : '▼';
      const sign   = isUp ? '+' : '';
      return `<span class="trend ${cls}">${arrow} ${sign}${Math.abs(pct).toFixed(1)}%</span>`;

    function fetchTab(tabName) {
      return new Promise(function(resolve, reject) {
        var cbName = 'mghCb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        var script = document.createElement('script');
        var timer = setTimeout(function() {
          delete window[cbName];
          if (script.parentNode) script.parentNode.removeChild(script);
          reject(new Error('Timeout fetching tab: ' + tabName));
        }, 10000);
        window[cbName] = function(data) {
          clearTimeout(timer);
          delete window[cbName];
          if (script.parentNode) script.parentNode.removeChild(script);
          resolve(data.table.rows);
        };
        script.onerror = function() {
          clearTimeout(timer);
          delete window[cbName];
          reject(new Error('Failed to load tab: ' + tabName));
        };
        script.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
          '/gviz/tq?tqx=out:json;responseHandler:' + cbName +
          '&sheet=' + encodeURIComponent(tabName) +
          '&cachebust=' + Date.now();
        document.head.appendChild(script);
      });
    }

    function cell(rows, rowIdx, colIdx) {
      try { var v = rows[rowIdx].c[colIdx]; return v && v.v !== null ? String(v.v) : ''; }
      catch(e) { return ''; }
    }
    function cellPct(rows, rowIdx, colIdx) {
      try {
        var v = rows[rowIdx].c[colIdx];
        if (!v || v.v === null) return 0;
        var s = String(v.v);
        if (s.indexOf('%') >= 0) return parseFloat(s);
        return Number(v.v) * 100;
      } catch(e) { return 0; }
    }
    function cellNum(rows, rowIdx, colIdx) {
      try { var v = rows[rowIdx].c[colIdx]; return v && v.v !== null ? Number(v.v) : 0; }
      catch(e) { return 0; }
    }
    function findRow(rows, searchText, colIdx) {
      colIdx = colIdx || 0;
      var lower = searchText.toLowerCase();
      for (var i = 0; i < rows.length; i++) {
        var val = cell(rows, i, colIdx).toLowerCase();
        if (val && val.indexOf(lower) >= 0) return i;
      }
      return -1;
    }

    async function buildDataFromSheet() {
      var tabs = await Promise.all([
        fetchTab('Config'),
        fetchTab('KPI'),
        fetchTab('Showhome Visits'),
        fetchTab('Budget Tracking'),
        fetchTab('Lead Cycle'),
        fetchTab('Sticky Stock'),
      ]);
      window._rawTabs = tabs;
      var cfg = tabs[0], kpi = tabs[1], show = tabs[2],
          bud = tabs[3], lead = tabs[4], sticky = tabs[5];

      var cfgPeriod   = findRow(cfg, 'Dashboard Period Label');
      var cfgRegion   = findRow(cfg, 'Showhome Region');
      var cfgBudMth   = findRow(cfg, 'Budget Month Label');
      var cfgSticky   = findRow(cfg, 'Sticky Stock Month');
      var cfgShFoot   = findRow(cfg, 'Showhome Footer');
      var cfgLeadFoot = findRow(cfg, 'Lead Cycle Footer');
      var cfgStkFoot  = findRow(cfg, 'Sticky Stock Footer');

      var insightRows = [];
      for (var ii = 0; ii < kpi.length; ii++) {
        if (cell(kpi, ii, 0).toLowerCase().indexOf('insights label') >= 0) insightRows.push(ii);
      }

      function identifySection(insRow) {
        for (var i = insRow; i >= Math.max(0, insRow - 10); i--) {
          var v = cell(kpi, i, 0).toLowerCase();
          if (v.indexOf('lead') >= 0)    return 'lead';
          if (v.indexOf('traffic') >= 0 || v.indexOf('website') >= 0) return 'traffic';
          if (v.indexOf('guide') >= 0)   return 'guide';
        }
        return 'unknown';
      }

      function extractSection(insRow, isGuide) {
        var rows = [0, 1, 2].map(function(i) {
          var r = insRow - 3 + i;
          if (isGuide) {
            var p1 = cell(kpi, r, 0), p2 = cell(kpi, r, 1);
            var val = cell(kpi, r, 2); if (!val || val === '') val = 'NA';
            return { period: p1 + (p2 ? '\n' + p2 : ''), value: val, pct: cellNum(kpi, r, 3) };
          } else {
            return { period: cell(kpi, r, 0), value: cell(kpi, r, 1), pct: cellNum(kpi, r, 2) };
          }
        });
        return {
          rows: rows,
          insights: { label: cell(kpi, insRow, 1), text: cell(kpi, insRow + 1, 1) }
        };
      }

      var leadEnq  = { rows: [], insights: { label: '', text: '' } };
      var webTraff = { rows: [], insights: { label: '', text: '' } };
      var guideDl  = { rows: [], insights: { label: '', text: '' } };

      var sectionOrder = ['lead', 'traffic', 'guide'];
      insightRows.forEach(function(insRow, idx) {
        var type = identifySection(insRow);
        if (type === 'unknown') type = sectionOrder[idx] || 'unknown';
        if (type === 'lead')    leadEnq  = extractSection(insRow, false);
        if (type === 'traffic') webTraff = extractSection(insRow, false);
        if (type === 'guide')   guideDl  = extractSection(insRow, true);
      });

      function budRows(subKeyword, count, labelCol, subCol, valCol) {
        var firstRow = findRow(bud, subKeyword, subCol);
        if (firstRow < 0) return [];
        var result = [];
        for (var i = 0; i < count; i++) {
          var r = firstRow + i;
          var lbl = cell(bud, r, labelCol);
          if (!lbl) break;
          result.push({ label: lbl, sub: cell(bud, r, subCol), value: cell(bud, r, valCol) });
        }
        return result;
      }

      function ytdByYear(yearStr, dim) {
        var result = [];
        for (var i = 0; i < bud.length; i++) {
          var lbl = cell(bud, i, 0);
          var val = cell(bud, i, 1);
          if (lbl && lbl.indexOf(yearStr) >= 0 && val && val !== '') {
            result.push({ label: lbl, value: val, dim: dim });
          }
        }
        return result;
      }

      var actuals  = budRows('Actual',  3, 0, 1, 2);
      var planned  = budRows('Planned', 3, 0, 1, 2);
      if (planned[0]) planned[0].dim = planned[0].value.indexOf('X') >= 0;
      if (planned[1]) planned[1].dim = false;
      if (planned[2]) planned[2].dim = true;
      var ytdCurr  = ytdByYear('2026', false);
      var ytdPrev  = ytdByYear('2025', true);

      var leadCycleRows = [];
      for (var lci = 0; lci < lead.length; lci++) {
        var lcDays = cellNum(lead, lci, 2);
        var lcPeriod = cell(lead, lci, 0);
        if (lcDays > 0 && (lcPeriod.indexOf('202') >= 0 || lcPeriod.indexOf('201') >= 0)) {
          leadCycleRows.push(lci);
        }
      }

      var stickyHdr = findRow(sticky, 'Development');
      var stickyStart = stickyHdr >= 0 ? stickyHdr + 1 : 0;

      var showSlotMap = {};
      for (var si = 0; si < show.length; si++) {
        var slotVal = cell(show, si, 0);
        var slotNum = parseFloat(slotVal);
        if (!isNaN(slotNum) && slotNum >= 1 && slotNum <= 16) {
          showSlotMap[slotNum] = si;
        }
      }

      return {
        period:         cfgPeriod   >= 0 ? cell(cfg, cfgPeriod,   1) : DATA.period,
        showhomeRegion: cfgRegion   >= 0 ? cell(cfg, cfgRegion,   1) : DATA.showhomeRegion,
        budgetMonth:    cfgBudMth   >= 0 ? cell(cfg, cfgBudMth,   1) : DATA.budgetMonth,
        stickyMonth:    cfgSticky   >= 0 ? cell(cfg, cfgSticky,   1) : DATA.stickyMonth,
        showhomeFooter: cfgShFoot   >= 0 ? cell(cfg, cfgShFoot,   1) : DATA.showhomeFooter,
        leadUpdated:    cfgLeadFoot >= 0 ? cell(cfg, cfgLeadFoot, 1) : DATA.leadUpdated,
        stickyUpdated:  cfgStkFoot  >= 0 ? cell(cfg, cfgStkFoot,  1) : DATA.stickyUpdated,
        kpi: [
          { title: 'Lead enquiries',  rows: leadEnq.rows,  insights: leadEnq.insights  },
          { title: 'Website traffic', rows: webTraff.rows, insights: webTraff.insights },
          { title: 'Guide downloads', rows: guideDl.rows,  insights: guideDl.insights  },
        ],
        showhomes: Array.from({length: 16}, function(_, i) {
          var slot = i + 1;
          if (!(slot in showSlotMap)) return { location: '', visits: null };
          var r = showSlotMap[slot];
          var loc = cell(show, r, 1);
          var vis = cell(show, r, 2);
          return { location: loc, visits: (vis === '' || vis === '—') ? null : Number(vis) };
        }),
        budgetActual:    actuals,
        budgetPlanned:   planned,
        budgetYTDCurrent: ytdCurr,
        budgetYTDPrev:    ytdPrev,
        leadCycle: [0, 1, 2].map(function(i) {
          if (i >= leadCycleRows.length) return { period: '', sub: '', days: 0, pct: 0 };
          var r = leadCycleRows[i];
          return { period: cell(lead, r, 0), sub: cell(lead, r, 1), days: cellNum(lead, r, 2), pct: cellPct(lead, r, 3) };
        }),
        stickyStock: [0, 1].map(function(i) {
          var r = stickyStart + i;
          return { label: cell(sticky, r, 0), value: cell(sticky, r, 1), action: cell(sticky, r, 2) };
        }),
      };
    }

    function showStatus(msg, colour) {
      var bar = document.getElementById('data-status');
      if (!bar) return;
      bar.innerHTML = msg + ' &nbsp;&nbsp;<button onclick="if(window._rawTabs)showDebug(window._rawTabs)" style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:2px 10px;cursor:pointer;border-radius:3px;font-size:11px;vertical-align:middle">🔍 Debug data</button>';
      bar.style.background = colour;
      bar.style.display = 'block';
    }

    function showDebug(tabs) {
      var names = ['Config','KPI','Showhome Visits','Budget Tracking','Lead Cycle','Sticky Stock'];
      var html = '<div style="position:fixed;inset:0;background:#1F1F1E;color:#ECE8DF;font-family:monospace;font-size:11px;overflow:auto;z-index:9999;padding:20px">';
      html += '<button onclick="this.parentNode.remove()" style="position:fixed;top:12px;right:16px;background:#AC3939;color:#fff;border:none;padding:6px 14px;cursor:pointer;border-radius:4px">Close</button>';
      tabs.forEach(function(rows, ti) {
        html += '<h3 style="color:#838C73;margin:16px 0 6px">' + names[ti] + ' (' + rows.length + ' rows)</h3>';
        html += '<table style="border-collapse:collapse;margin-bottom:12px">';
        html += '<tr><th style="padding:2px 8px;border:1px solid #36453D;color:#B6AEA5">row</th><th style="padding:2px 8px;border:1px solid #36453D;color:#B6AEA5">col0</th><th style="padding:2px 8px;border:1px solid #36453D;color:#B6AEA5">col1</th><th style="padding:2px 8px;border:1px solid #36453D;color:#B6AEA5">col2</th><th style="padding:2px 8px;border:1px solid #36453D;color:#B6AEA5">col3</th></tr>';
        rows.slice(0, 35).forEach(function(row, ri) {
          html += '<tr>';
          html += '<td style="padding:2px 8px;border:1px solid #36453D;color:#B6AEA5">' + ri + '</td>';
          [0,1,2,3].forEach(function(ci) {
            var v = row.c && row.c[ci] && row.c[ci].v !== null ? String(row.c[ci].v) : '';
            html += '<td style="padding:2px 8px;border:1px solid #36453D;max-width:220px;overflow:hidden;white-space:nowrap">' + v.substring(0,60) + '</td>';
          });
          html += '</tr>';
        });
        html += '</table>';
      });
      html += '</div>';
      var div = document.createElement('div');
      div.innerHTML = html;
      document.body.appendChild(div.firstChild);
    }

    async function loadAndRender() {
      try {
        var liveData = await buildDataFromSheet();
        Object.assign(DATA, liveData);
        showStatus('✓ Live data loaded from Google Sheets — ' + new Date().toLocaleTimeString(), '#36453D');
      } catch(err) {
        showStatus('⚠ Could not reach Google Sheet — showing fallback data. Error: ' + err.message, '#AC3939');
      }
      renderDashboard();
    }

    function renderDashboard() {
      const d = DATA;

      document.getElementById('dash-period').textContent = '(' + d.period + ')';

      document.getElementById('kpi-grid').innerHTML = d.kpi.map(card => `
        <div class="kpi-card">
          <div class="kpi-card-title">${card.title}</div>
          <div class="kpi-rows">
            ${card.rows.map(r => `
              <div class="kpi-row">
                <span class="kpi-period">${r.period.replace(/\n/g, '<br>')}</span>
                <div class="kpi-value-group">
                  <span class="kpi-value${r.value === 'NA' ? ' na' : ''}">${fmtNum(r.value)}</span>
                  ${trend(r.pct)}
                </div>
              </div>
            `).join('')}
          </div>
          ${card.insights ? `
            <div class="key-insights">
              <span class="key-insights-label">${card.insights.label}</span>
              ${card.insights.text}
            </div>
          ` : ''}
        </div>
      `).join('');

      document.getElementById('showhome-title').textContent  = d.showhomeRegion + ' — Showhome visits';
      document.getElementById('showhome-footer').textContent = d.showhomeFooter;
      document.getElementById('showhome-grid').innerHTML = d.showhomes.map(s => `
        <div class="showhome-cell${!s.location ? ' showhome-cell--empty' : ''}">
          <div class="showhome-location">${s.location}</div>
          <div class="showhome-count">${s.visits !== null ? s.visits : ''}</div>
        </div>
      `).join('');

      document.getElementById('budget-month-title').textContent = d.budgetMonth;
      document.getElementById('budget-actual-row').innerHTML = d.budgetActual.map(c => `
        <div class="budget-cell">
          <div class="budget-cell-text">
            <div class="budget-label">${c.label}</div>
            <div class="budget-sublabel">${c.sub}</div>
          </div>
          <div class="budget-value${c.dim ? ' dim' : ''}">${fmtNum(c.value)}</div>
        </div>
      `).join('');
      document.getElementById('budget-planned-row').innerHTML = d.budgetPlanned.map(c => `
        <div class="budget-cell">
          <div class="budget-cell-text">
            <div class="budget-label">${c.label}</div>
            <div class="budget-sublabel">${c.sub}</div>
          </div>
          <div class="budget-value${c.dim ? ' dim' : ''}">${fmtNum(c.value)}</div>
        </div>
      `).join('');
      document.getElementById('budget-ytd-current').innerHTML = d.budgetYTDCurrent.map(c => `
        <div class="budget-ytd-cell">
          <div class="budget-ytd-label">${c.label.replace(/\n/g,'<br>')}</div>
          <div class="budget-ytd-value${c.dim ? ' dim' : ''}">${fmtNum(c.value)}</div>
        </div>
      `).join('');
      document.getElementById('budget-ytd-prev').innerHTML = d.budgetYTDPrev.map(c => `
        <div class="budget-ytd-cell">
          <div class="budget-ytd-label">${c.label.replace(/\n/g,'<br>')}</div>
          <div class="budget-ytd-value dim">${c.value}</div>
        </div>
      `).join('');

      document.getElementById('lead-updated').innerHTML =
        `<div class="lead-updated-cell">${d.leadUpdated}</div>` +
        `<div class="lead-updated-cell"></div>` +
        `<div class="lead-updated-cell"></div>`;
      document.getElementById('lead-grid').innerHTML = d.leadCycle.map(l => `
        <div class="lead-cell">
          <div class="lead-cell-left">
            <div class="lead-period">${l.period}</div>
            <div class="lead-sublabel">${l.sub}</div>
          </div>
          <div class="lead-cell-right">
            <div class="lead-value">${l.days} days</div>
            ${trend(l.pct, true)}
          </div>
        </div>
      `).join('');

      document.getElementById('sticky-title').textContent   = d.stickyMonth;
      document.getElementById('sticky-updated').textContent = d.stickyUpdated;
      document.getElementById('sticky-grid').innerHTML = d.stickyStock.map(s => `
        <div class="sticky-cell">
          <div class="sticky-label">${s.label}</div>
          <div class="sticky-value">${fmtNum(s.value)}</div>
          <div class="sticky-action-label">Action:</div>
          <div class="sticky-action">
            <span class="sticky-arrow">→</span>
            <span>${s.action}</span>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
